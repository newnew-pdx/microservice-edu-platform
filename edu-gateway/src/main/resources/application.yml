server:
  port: 8080

spring:
  application:
    name: edu-gateway
  cloud:
    nacos:
      discovery:
        # Step2 只接入 Nacos Discovery，用于服务注册与发现，不启用配置中心。
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          # 本阶段使用手写 routes，避免自动暴露额外服务名路径。
          enabled: false
      routes:
        - id: edu-user-service
          uri: lb://edu-user-service
          predicates:
            - Path=/user/**
        - id: edu-course-service
          uri: lb://edu-course-service
          predicates:
            - Path=/course/**
        - id: edu-trade-service
          uri: lb://edu-trade-service
          predicates:
            - Path=/trade/**
        - id: edu-learning-service
          uri: lb://edu-learning-service
          predicates:
            - Path=/learning/**

edu:
  jwt:
    secret: "edu-platform-step1-local-secret-key-please-change-later"
