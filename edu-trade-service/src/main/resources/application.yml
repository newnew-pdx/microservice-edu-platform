server:
  port: 8083

spring:
  application:
    name: edu-trade-service
  datasource:
    # Step7 交易服务继续使用现有 edu_platform 数据库保存订单和优惠券领取记录。
    url: jdbc:mysql://localhost:3307/edu_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: edu_user
    password: edu_pass123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      # Redis 承担优惠券库存与重复领取的并发控制，异常时不绕过 Redis 直接落库。
      host: localhost
      port: 6379
      connect-timeout: 1s
      timeout: 2s
  rabbitmq:
    # Step8 本地 RabbitMQ，仅用于订单超时消息链路。
    host: localhost
    port: 5672
    username: edu_mq
    password: edu_mq_pass
    virtual-host: /
    connection-timeout: 3s
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: true
  cloud:
    nacos:
      discovery:
        # Step2 只接入 Nacos Discovery，用于服务注册与发现，不启用配置中心。
        server-addr: localhost:8848

order:
  timeout:
    # 真实业务通常可配置为 15 分钟，本地使用 30 秒便于验证。
    seconds: 30

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.dyl.edu.trade.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    # 本地学习阶段输出 Mapper 调用和 SQL，便于观察订单及优惠券落库过程。
    com.dyl.edu.trade.mapper: debug
